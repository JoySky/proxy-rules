# ====================================================
# Clash Verge Rev (Mihomo) 独立订阅全局增强覆写模板 (Merge)
# ====================================================

# ----------------------------------------------------
# 1. 基础运行模式与网络设定
# ----------------------------------------------------
mode: rule                  
mixed-port: 7897            
allow-lan: false            
log-level: warning            
ipv6: true                  
unified-delay: true         
bind-address: '*'           
tcp-concurrent: true        
keep-alive-interval: 15     

# ----------------------------------------------------
# 2. 控制台通信与跨域白名单 (用于 Yacd 等 Web 面板)
# ----------------------------------------------------
external-controller: 127.0.0.1:9097               
secret: '123456'
external-controller-pipe: \\.\pipe\verge-mihomo   
external-controller-cors:                         
  allow-private-network: true                     
  allow-origins:                                  
    - tauri://localhost
    - http://tauri.localhost
    - https://yacd.metacubex.one
    - http://yacd.metacubex.one
    - https://metacubex.github.io
    - http://metacubex.github.io

# ----------------------------------------------------
# 3. GeoData 数据库设置 (用于精准判断 IP 和域名归属)
# ----------------------------------------------------
geodata-mode: true          
geo-auto-update: true       
geo-update-interval: 24     
geox-url:                   
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

# ----------------------------------------------------
# 4. TUN 虚拟网卡模式 (底层接管电脑全部流量)
# ----------------------------------------------------
tun:
  enable: true                 
  auto-detect-interface: true  
  auto-route: true             
  device: Mihomo               
  dns-hijack:                  
    - any:53
  mtu: 1400                    
  route-exclude-address: []    
  stack: mixed                 
  strict-route: true  
  endpoint-independent-nat: true
# ----------------------------------------------------
# X. 流量嗅探 (破解 APP 直连 IP 导致的分流失效)
# ----------------------------------------------------
sniffer:
  enable: true
  parse-pure-ip: true             # 核心：尝试反向解析纯 IP 连接
  override-destination: true      # 核心：用嗅探到的真实域名替换掉原来的 IP
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443]
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
    - "+.tiktok.com"
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"

# ----------------------------------------------------
# 5. DNS 防泄漏与 Fake-IP 解析核心
# ----------------------------------------------------
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip       
  listen: 0.0.0.0:53                  
  default-nameserver:          
    - system
    - 223.6.6.6
    - 8.8.8.8
    - 2400:3200::1
    - 2001:4860:4860::8888
  nameserver:                  
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:     
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - tls://223.5.5.5
  direct-nameserver: []
  direct-nameserver-follow-policy: false
  fake-ip-range: 198.18.0.1/16 
  fake-ip-filter-mode: blacklist
  fake-ip-filter:              
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - '*.msftncsi.com'
    - www.msftconnecttest.com
  fallback: []                 
  fallback-filter:             
    geoip: true
    geoip-code: CN
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
  prefer-h3: false             
  respect-rules: false
  use-hosts: false
  use-system-hosts: false

# ----------------------------------------------------
# 6. UI 行为与持久化缓存
# ----------------------------------------------------
profile:
  store-selected: true         
  store-fake-ip: true          

# ----------------------------------------------------
# 7. 代理组 (极简嵌套架构 - The Masterpiece)
# ----------------------------------------------------
proxy-groups:
  # === 1. 顶层面板 (只留五个，极度清爽) ===
  - name: 🌐 网络出口
    type: select
    proxies:
      - 🛡️ 稳定连接
      - 🚀 自动测速
      - 🕹️ 手动选择
      - 🤖 AI 通道
      - 🎯 国内直连

 
  # === 2. 终极主路由：区域故障转移 ===
  - name: 🛡️ 稳定连接
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - 🇭🇰 香港节点      
      - 🇯🇵 日本节点      
      - 🇸🇬 新加坡节点    
      - 🇹🇼 台湾节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌍 其他节点

  # === 3. 自动切换面板 ===
  - name: 🚀 自动测速
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇹🇼 台湾节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌍 其他节点

  # === 4. 手动面板 ===
  - name: 🕹️ 手动选择
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌍 其他节点
      
  # === 5. AI 专属 (保持不变) ===
  - name: 🤖 AI 通道
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🇹🇼 台湾节点
      - 🇰🇷 韩国节点
      
  # === 6. 国内直连 ===
  - name: 🎯 国内直连
    type: select
    proxies:
      - DIRECT     
      
  # === 7. 地区自动测速===
  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇭🇰|HK|香港|HongKong"
    
  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇯🇵|JP|日本|Japan"

  - name: 🇸🇬 新加坡节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇸🇬|SG|新加坡|Singapore"

  - name: 🇹🇼 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇹🇼|TW|台湾|Taiwan"

  - name: 🇰🇷 韩国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇰🇷|KR|韩国|Korea"

  - name: 🇺🇸 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇺🇸|US|美国|America"

  - name: 🌍 其他节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    exclude-filter: "(?i)🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇺🇸|🇰🇷|HK|TW|SG|JP|US|KR|香港|台湾|新加坡|日本|韩国|美国|到期|通知|测试|官网|剩余|流量|QQ群|TG群|更新|重置"

# ----------------------------------------------------
