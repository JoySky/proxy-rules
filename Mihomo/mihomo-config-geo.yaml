# ====================================================
# Clash Verge Rev (Mihomo) 黄金混合版覆写模板
# 核心理念：保留 Loyalsoldier 的去广告与进程管控，其余交由 GeoData 极速分流
# ====================================================

# ----------------------------------------------------
# 1. 基础运行模式与网络设定
# ----------------------------------------------------
mode: rule                  
mixed-port: 7897            
allow-lan: false            
log-level: warning          
ipv6: true                  
unified-delay: true         
bind-address: '*'           
tcp-concurrent: true        
keep-alive-interval: 15     

# ----------------------------------------------------
# 2. 控制台通信与跨域白名单 (Yacd 等 Web 面板通行证)
# ----------------------------------------------------
external-controller: 127.0.0.1:9097               
external-controller-pipe: \\.\pipe\verge-mihomo   
external-controller-cors:                         
  allow-private-network: true                     
  allow-origins:                                  
    - tauri://localhost
    - http://tauri.localhost
    - https://yacd.metacubex.one
    - http://yacd.metacubex.one
    - https://metacubex.github.io
    - http://metacubex.github.io

# ----------------------------------------------------
# 3. GeoData 数据库设置 (极速分类引擎)
# ----------------------------------------------------
geodata-mode: true          
geo-auto-update: true       
geo-update-interval: 24     
geox-url:                   
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

# ----------------------------------------------------
# 4. TUN 虚拟网卡模式 (底层流量全面接管)
# ----------------------------------------------------
tun:
  enable: true                 
  auto-detect-interface: true  
  auto-route: true             
  device: Mihomo               
  dns-hijack:                  
    - any:53
  mtu: 1400                    
  route-exclude-address: []    
  stack: mixed                 
  strict-route: true
  endpoint-independent-nat: true
# ----------------------------------------------------
# X. 流量嗅探 (破解 APP 直连 IP 导致的分流失效)
# ----------------------------------------------------
sniffer:
  enable: true
  parse-pure-ip: true             # 核心：尝试反向解析纯 IP 连接
  override-destination: true      # 核心：用嗅探到的真实域名替换掉原来的 IP
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443]
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
    - "+.tiktok.com"
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"
# ----------------------------------------------------
# 5. DNS 防泄漏与 Fake-IP 解析核心
# ----------------------------------------------------
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip       
  listen: 0.0.0.0:53                  
  default-nameserver:          
    - system
    - 223.6.6.6
    - 114.114.114.114
    - 2400:3200::1
    - 2001:4860:4860::8888
  nameserver:                  
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:     
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - tls://223.5.5.5
  direct-nameserver: []
  direct-nameserver-follow-policy: false
  fake-ip-range: 198.18.0.1/16 
  fake-ip-filter-mode: blacklist
  fake-ip-filter:              
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - '*.msftncsi.com'
    - www.msftconnecttest.com
  fallback: []                 
  fallback-filter:             
    geoip: true
    geoip-code: CN
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
  prefer-h3: false             
  respect-rules: false
  use-hosts: false
  use-system-hosts: false

# ----------------------------------------------------
# 6. UI 行为与持久化缓存
# ----------------------------------------------------
profile:
  store-selected: true         
  store-fake-ip: true          

# ----------------------------------------------------
# 7. 代理组 (极简嵌套架构 - The Masterpiece)
# ----------------------------------------------------
proxy-groups:
  # === 1. 顶层面板 (只留五个，极度清爽) ===
  - name: 🌐 全局策略
    type: select
    proxies:
      - 🛡️ 稳定策略
      - 🚀 极速策略
      - 🕹️ 手动策略
      - 🤖 AI 策略
      - 🎯 直连策略

  # === 2. 终极主路由：区域故障转移 ===
  - name: 🛡️ 稳定策略
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - 🇭🇰 香港节点      
      - 🇯🇵 日本节点      
      - 🇸🇬 新加坡节点    
      - 🇹🇼 台湾节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌍 其他节点

  # === 3. 自动切换面板 ===
  - name: 🚀 极速策略
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇹🇼 台湾节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌍 其他节点

  # === 4. 手动面板 ===
  - name: 🕹️ 手动策略
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌍 其他节点
      
  # === 5. AI 专属 (保持不变) ===
  - name: 🤖 AI 策略
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🇹🇼 台湾节点
      - 🇰🇷 韩国节点
      
  # === 6. 直连策略 ===
  - name: 🎯 直连策略
    type: select
    proxies:
      - DIRECT     
      
  # === 7. 地区节点自动测速===
  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇭🇰|HK|香港|HongKong"
    
  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇯🇵|JP|日本|Japan"

  - name: 🇸🇬 新加坡节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇸🇬|SG|新加坡|Singapore"

  - name: 🇹🇼 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇹🇼|TW|台湾|Taiwan"

  - name: 🇰🇷 韩国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇰🇷|KR|韩国|Korea"

  - name: 🇺🇸 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)🇺🇸|US|美国|America"

  - name: 🌍 其他节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    exclude-filter: "(?i)🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇺🇸|🇰🇷|HK|TW|SG|JP|US|KR|香港|台湾|新加坡|日本|韩国|美国|到期|通知|测试|官网|剩余|流量|QQ群|TG群|更新|重置"

# ----------------------------------------------------
# 8. 外部规则集 (仅保留最精华的两把“外科手术刀”)
# ----------------------------------------------------
rule-providers:
  # 第一把刀：防 P2P 泄露与高并发软件管控 (迅雷、BT、微信等)
  applications:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400
  
  # 第二把刀：懂国情的去广告库 (比 GeoData 的内置去广告更懂国内流氓软件)
  reject:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

# ====================================================
# 9. 黄金混合路由分流规则 (优先级自上而下严格匹配)
# ====================================================
rules:
  # --- 阶段零：AI 专属定点分流 (最高特权，防拦截) ---
  - GEOSITE,openai,🤖 AI 策略
  - GEOSITE,anthropic,🤖 AI 策略
  - GEOSITE,google-gemini,🤖 AI 策略
  - DOMAIN-SUFFIX,grok.com,🤖 AI 策略          # Grok 官网
  - DOMAIN-SUFFIX,x.ai,🤖 AI 策略              # Grok 接口
  - DOMAIN-SUFFIX,bing.com,🤖 AI 策略          # 抢在微软全局直连前，将 Bing/Copilot 划入 AI
  
  # --- 阶段一：高并发、控制面板与测速直连 (防跑流量首选) ---
  - RULE-SET,applications,DIRECT               # 迅雷、BT 等高并发软件直接放行
  - GEOSITE,category-speedtest,DIRECT          # 拦截 Speedtest 等各类测速软件/网站，走本地物理宽带
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  
  # --- 阶段二：去广告大闸 ---
  - RULE-SET,reject,REJECT                     # 强效拦截国内外追踪器与流氓广告
  
  # --- 阶段三：特定外网服务硬编码指向 (确保精确入轨) ---
  - GEOSITE,github,🌐 全局策略
  - GEOSITE,netflix,🌐 全局策略
  - GEOSITE,reddit,🌐 全局策略
  - GEOSITE,twitch,🌐 全局策略
  
  # --- 阶段四：GeoData 极速宏观直连接管 (免检通道) ---
  - GEOSITE,private,DIRECT                     # 局域网流量直连
  - GEOSITE,apple,DIRECT                       # 苹果服务直连 (App Store 等)
  - GEOSITE,onedrive,DIRECT                    # OneDrive 同步直连
  - GEOSITE,microsoft@cn,DIRECT                # 微软中国区服务直连
  - GEOSITE,microsoft,DIRECT                   # 微软全局直连 (如 Windows 更新、Xbox 下载)
  - GEOSITE,cn,DIRECT                          # 国内网站极速直连 (涵盖数十万个中国域名)
  
  # --- 阶段五：GeoData 外网全家桶与兜底 ---
  - GEOSITE,google,🌐 全局策略
  - GEOSITE,telegram,🌐 全局策略
  - GEOSITE,geolocation-!cn,🌐 全局策略              # 非国内域名强制代理兜底 (Geolocation 完美排除法)
  
  # --- 阶段六：底层 IP 规则防泄漏与兜底 (GEOIP) ---
  # 必须带 no-resolve，防止在这最后一步触发本地 DNS 真实解析导致运营商污染
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  
  # --- 阶段七：终极网兜 ---
  # 不在以上任何规则内的未知冷门流量，统统扔给代理处理
  - MATCH,🌐 全局策略
